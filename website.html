<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydronix Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 Heatmap Library -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
*{
box-sizing:border-box;
max-width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

img, canvas, video{
max-width:100%;
height:auto;
}

body{
margin:0;
overflow-x:hidden;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI";
}

body{
display:flex;
background:#f4f7fb;
transition:0.3s;
}

/* DARK MODE */
body.dark{
background:#0f172a;
color:white;
}
body.dark .card{
background:#1e293b;
color:white;
}
body.dark .sidebar{
background:#111827;
}

.sidebar{
width:230px;
height:100vh;
background:#003366;
color:white;
padding:25px 15px;
position:fixed;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:40px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:10px;
border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#0077cc;
transform:translateX(5px);
}

.main{
margin-left:230px;
width:100%;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
background:#0077cc;
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#005fa3;
transform:scale(1.05);
}

#map{
height:320px;
margin-top:30px;
border-radius:10px;
}

/* 📱 RESPONSIVE ONLY */
@media (max-width: 768px){

body{
flex-direction:column;
}

.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
}

.sidebar a{
margin:0;
padding:10px;
font-size:14px;
}

.logo{
width:100%;
text-align:center;
margin-bottom:10px;
}

.main{
margin-left:0;
padding:15px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.cards{
grid-template-columns:1fr;
}

.card{
padding:15px;
}

#map{
height:250px;
}

canvas{
height:250px !important;
}

.btn{
width:100%;
}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">💧 Hydronix</div>
<a href="index.html">🏠 Home</a>
<a href="خريطة.html">🌧️ Rain Map</a>
<a href="analysis.html">📊 Analysis for investors</a>
<a href="how.html">⚙️ System</a>
<a href="about us.html">ℹ️ About us</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h2>Dashboard 🌧️</h2>
<button onclick="toggleDark()" class="btn">🌙 Dark Mode</button>
</div>

<div class="cards">

<div class="card">
<h3>Rain Status</h3>
<p id="rain-status">Loading...</p>
</div>

<div class="card">
<h3>Water Saved</h3>
<p id="water">0 L 💧</p>
</div>

<div class="card">
<h3>System</h3>
<p id="system">Active ✅</p>
</div>

</div>

<canvas id="chart" style="margin-top:30px;"></canvas>

<div id="map"></div>

<button class="btn" style="margin-top:20px;" onclick="predictRain()">
Predict Rain 🤖
</button>

</div>

<script>

const API_KEY = "d831b8220bd3050330c5f6bed0e2690b";

let map;
let rainData = [];
let labels = [];
let chart;

function toggleDark(){
document.body.classList.toggle("dark");
}

async function loadWeather(lat = 30.0444, lon = 31.2357){

const res = await fetch(
`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
);

const data = await res.json();

labels = [];
rainData = [];

for(let i=0;i<7;i++){
labels.push(data.list[i].dt_txt.split(" ")[0]);
rainData.push(data.list[i].rain?.["3h"] ?? 0);
}

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Real Rain",
data:rainData,
borderWidth:2
},
{
label:"AI Prediction",
data:new Array(rainData.length).fill(null),
borderWidth:2,
borderDash:[5,5]
}
]
}
});

document.getElementById("rain-status").innerText =
rainData[0] > 5 ? "Heavy 🌧️" : "Light ☀️";

let water = rainData[0] * 120;

document.getElementById("water").innerText =
Math.round(water) + " L 💧";

}

async function loadMap(){

navigator.geolocation.getCurrentPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

loadWeather(lat, lon);

map = L.map("map").setView([lat,lon],8);

L.tileLayer("https://tile.openstreetmap.de/{z}/{x}/{y}.png").addTo(map);

L.marker([lat,lon]).addTo(map)
.bindPopup("You are here 📍")
.openPopup();

const res = await fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
);

const data = await res.json();

let rain = data.rain?.["1h"] ?? 0;

let history = JSON.parse(localStorage.getItem("rainHistory")) || [];

history.push({lat, lon, rain, date:new Date().toISOString()});

localStorage.setItem("rainHistory", JSON.stringify(history));

let heatPoints = history.map(r => [r.lat, r.lon, r.rain * 2]);

L.heatLayer(heatPoints,{
radius:25,
blur:15,
maxZoom:10,
gradient:{
0.1:"blue",
0.4:"lime",
0.7:"yellow",
1:"red"
}
}).addTo(map);

});

}

function predictRain(){

if(rainData.length === 0){
document.getElementById("rain-status").innerText = "No data yet ❌";
return;
}

document.getElementById("rain-status").innerText = "AI is thinking 🤖...";

setTimeout(()=>{

let x = rainData.map((_,i)=>i);
let y = rainData;

let n = x.length;
let sumX = x.reduce((a,b)=>a+b,0);
let sumY = y.reduce((a,b)=>a+b,0);
let sumXY = x.reduce((acc,_,i)=>acc + x[i]*y[i],0);
let sumX2 = x.reduce((acc,xi)=>acc + xi*xi,0);

let m = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
let b = (sumY - m*sumX) / n;

let predicted = x.map(i => m*i + b);

chart.data.datasets[1].data = predicted;
chart.update();

let last = predicted[predicted.length - 1];

if(last > 5){
document.getElementById("rain-status").innerText = "AI Prediction: Heavy Rain 🌧️";
}else if(last > 1){
document.getElementById("rain-status").innerText = "AI Prediction: Light Rain 🌦️";
}else{
document.getElementById("rain-status").innerText = "AI Prediction: No Rain ☀️";
}

},1200);

}

loadMap();

</script>

</body>
</html>
