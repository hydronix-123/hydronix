<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydronix Home</title>

<style>
    *{
box-sizing:border-box;
max-width:100%;
}
  .cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}
  img, canvas, video{
max-width:100%;
height:auto;
}

body{
margin:0;
overflow-x:hidden;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI";
}

/* ================= HERO ================= */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:flex-start;
padding:0 80px;
overflow:hidden;
color:white;
}

/* overlay */
.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:1;
}

/* TEXT */
.hero-text{
position:relative;
z-index:2;
max-width:600px;
transition:0.4s;
}

.hero-text h1{
font-size:52px;
transition:0.4s;
}

.hero-text p{
margin-top:15px;
color:#f1f1f1;
line-height:1.6;
transition:0.4s;
}

/* hover animation */
.hero-text:hover{
transform:translateY(-6px);
}

.hero-text:hover h1{
letter-spacing:1px;
}

.hero-text button{
margin-top:20px;
padding:12px 22px;
border:none;
border-radius:8px;
background:#0077cc;
color:white;
cursor:pointer;
transition:0.3s;
}

.hero-text button:hover{
background:#005fa3;
transform:scale(1.05);
}

/* ================= SLIDER ================= */
.slider{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1.5s ease-in-out;
}

.slide.active{
opacity:1;
}

/* ================= NAV (Register بدل Menu) ================= */
.nav{
position:fixed;
top:20px;
right:30px;
z-index:10;
}

.nav button{
padding:10px 18px;
border:none;
border-radius:8px;
background:white;
color:#003366;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.nav button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>



<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>Smart Water & Rain Monitoring</h1>
<p>
A modern system that predicts rainfall, saves water, and helps manage environmental resources efficiently using AI and real-time data.
</p>

<button onclick="start()">
Get Started
</button>
</div>

<div class="slider">
<img class="slide active" src="https://marketplace.canva.com/MADFg4BaeGA/1/thumbnail_large/canva-rain-clouds-MADFg4BaeGA.jpg">
<img class="slide" src="https://www.emaratalyoum.com/polopoly_fs/1.1996983.1765695231!/image/image.jpeg">
<img class="slide" src="https://darelhilal.com/Media/News/2023/6/18/2023-638226448015933703-593.jpeg">
<img class="slide" src="https://liteamay.nyc3.digitaloceanspaces.com/2021/11/%D9%85%D8%B7%D8%B1-780x470.jpg">
</div>

</section>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
slides[index].classList.remove("active");
index = (index + 1) % slides.length;
slides[index].classList.add("active");
}, 3000);

function ttt(){
  window.location.href = "register.html";
}

function start(){
  window.location.href = "register.html";
}
</script>

</body>
</html>
