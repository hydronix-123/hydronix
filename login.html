<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 🔥 container responsive */
.container {
  display: flex;
  width: 90%;
  max-width: 1100px;
  min-height: 500px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  background: #fff;
}

/* left side */
.left {
  width: 50%;
  background: url('background.jpeg') center/cover no-repeat;
  position: relative;
}

.overlay h2 {
  position: absolute;
  bottom: 30px;
  left: 30px;
  color: #ffffff;
  font-size: 24px;
}

/* right side */
.right {
  width: 50%;
  background: #003366;
  color: #ffffff;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 30px;
}

/* text */
.top {
  text-align: center;
}

.top h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.top p {
  font-size: 15px;
  color: #a3d1ff;
}

/* form */
.middle form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

form input {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 8px;
  background: #004080;
  color: #ffffff;
  font-size: 14px;
}

/* password */
.password-field {
  position: relative;
}

.password-field span {
  position: absolute;
  right: 15px;
  top: 12px;
  cursor: pointer;
}

/* button */
button {
  width: 100%;
  padding: 15px;
  background: #0055a5;
  border: none;
  border-radius: 8px;
  color: #ffffff;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #004080;
}

/* bottom */
.bottom {
  text-align: center;
  font-size: 14px;
}

.bottom a {
  color: #a3d1ff;
  text-decoration: none;
}

/* 📱 الموبايل */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left {
    width: 100%;
    height: 200px;
  }

  .right {
    width: 100%;
    padding: 25px;
  }

  .top h1 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="overlay">
      <h2>Welcome Back!</h2>
    </div>
  </div>

  <div class="right">

    <div class="top">
      <h1>Log In</h1>
      <p>Enter your credentials to continue.</p>
    </div>

    <div class="middle">
      <form onsubmit="handleLogin(event)">
        <input type="email" placeholder="Email" required>

        <div class="password-field">
          <input type="password" placeholder="Enter your password" required>
          <span onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Log In</button>
      </form>
    </div>

    <div class="bottom">
      <p>Don't have an account? <a href="register.html">Sign up</a></p>
    </div>

  </div>

</div>

<script>
function togglePassword() {
  const password = document.querySelector('input[type="password"]');
  password.type = password.type === "password" ? "text" : "password";
}

function handleLogin(e) {
  e.preventDefault();
  alert("Login button clicked ✅");
}
</script>

</body>
</html>
