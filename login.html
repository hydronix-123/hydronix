<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In</title>

<style>
*{
box-sizing:border-box;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

img, canvas, video{
max-width:100%;
height:auto;
}

body{
margin:0;
overflow-x:hidden;
font-family: 'Segoe UI', sans-serif;
background: #f5f5f5;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

/* container */
.container {
  display: flex;
  width: 1100px;
  height: 500px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  background: #fff;
}

/* left */
.left {
  width: 50%;
  background: url('background.jpeg') center/cover no-repeat;
  position: relative;
}

.overlay h2 {
  position: absolute;
  bottom: 30px;
  left: 30px;
  color: #ffffff;
  font-size: 24px;
}

/* right */
.right {
  width: 50%;
  background: #003366;
  color: #ffffff;
  padding: 50px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.top {
  text-align: center;
}

.top h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.top p {
  font-size: 16px;
  color: #a3d1ff;
  margin-bottom: 30px;
}

.middle form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

form input {
  width: 100%;
  padding: 20px;
  border: none;
  border-radius: 8px;
  background: #004080;
  color: #ffffff;
  font-size: 16px;
}

.password-field {
  position: relative;
}

.password-field span {
  position: absolute;
  right: 15px;
  top: 18px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 20px;
  background: #0055a5;
  border: none;
  border-radius: 8px;
  color: #ffffff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #004080;
}

.bottom {
  text-align: center;
  font-size: 14px;
}

.bottom a {
  color: #a3d1ff;
  text-decoration: none;
}

/* 📱 RESPONSIVE ONLY */
@media (max-width: 768px) {
  body {
    height: auto;
    padding: 20px 0;
  }

  .container {
    flex-direction: column;
    width: 95%;
    height: auto;
  }

  .left {
    width: 100%;
    height: 200px;
  }

  .right {
    width: 100%;
    padding: 25px;
    gap: 20px;
  }

  .overlay h2 {
    font-size: 18px;
    bottom: 15px;
    left: 15px;
  }

  .top h1 {
    font-size: 24px;
  }

  .top p {
    font-size: 14px;
  }

  form input {
    padding: 15px;
    font-size: 14px;
  }

  button {
    padding: 15px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="overlay">
      <h2>Welcome Back!</h2>
    </div>
  </div>

  <div class="right">

    <div class="top">
      <h1>Log In</h1>
      <p>Enter your credentials to continue.</p>
    </div>

    <div class="middle">
      <form onsubmit="handleLogin(event)">
        <input type="email" placeholder="Email" required>

        <div class="password-field">
          <input type="password" placeholder="Enter your password" required>
          <span onclick="togglePassword()">👁</span>
        </div>

        <button type="submit" onclick="website2">Log In</button>
      </form>
    </div>

    <div class="bottom">
      <p>Don't have an account? <a href="register.html">Sign up</a></p>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAswvBN_h2Cx94a0QaYetgmdrGeKYGl6rU",
  authDomain: "lucky-nature-490301-d9.firebaseapp.com",
  projectId: "lucky-nature-490301-d9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.handleLogin = function(e) {
  e.preventDefault();

  const email = document.querySelector('input[type="email"]').value;
  const password = document.querySelector('input[type="password"]').value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login successful ✅");
      localStorage.setItem("loggedIn", "true");
      window.location.href = "website.html";
    })
    .catch(() => {
      alert("Wrong email or password ❌");
    });
}

window.togglePassword = function() {
  const password = document.querySelector('input[type="password"]');
  password.type = password.type === "password" ? "text" : "password";
}
</script>

<script>
function togglePassword() {
  const password = document.querySelector('input[type="password"]');
  password.type = password.type === "password" ? "text" : "password";
}

function handleLogin(e) {
  e.preventDefault();
  window.location.href = 'website.html';
}
</script>

</body>
</html>
