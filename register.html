<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
*{
  box-sizing:border-box;
  max-width:100%;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

img, canvas, video{
  max-width:100%;
  height:auto;
}

body{
  margin:0;
  overflow-x:hidden;
}

/* base styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  width: 1100px;
  height: 650px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  background: #fff;
}

.left {
  width: 50%;
  background: url('background.jpeg') center/cover no-repeat;
  position: relative;
}

.overlay h2 {
  position: absolute;
  bottom: 30px;
  left: 30px;
  color: #ffffff;
  font-size: 24px;
}

.right {
  width: 50%;
  background: #003366;
  color: #ffffff;
  padding: 50px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
  border-radius: 0 12px 12px 0;
}

.top {
  text-align: center;
}

.top h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.top p {
  font-size: 16px;
  color: #a3d1ff;
  margin-bottom: 30px;
}

.middle form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.middle .row {
  display: flex;
  gap: 15px;
}

form input {
  width: 100%;
  padding: 20px;
  border: none;
  border-radius: 8px;
  background: #004080;
  color: #ffffff;
  font-size: 16px;
}

.password-field {
  position: relative;
}

.password-field span {
  position: absolute;
  right: 15px;
  top: 18px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 20px;
  background: #0055a5;
  border: none;
  border-radius: 8px;
  color: #ffffff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #004080;
}

.bottom {
  text-align: center;
  font-size: 14px;
}

.bottom a {
  color: #a3d1ff;
  text-decoration: none;
}

/* 📱 responsive */
@media (max-width: 768px) {

  body {
    height: auto;
    padding: 20px 0;
  }

  .container {
    flex-direction: column;
    width: 95%;
    height: auto;
  }

  .left {
    width: 100%;
    height: 200px;
  }

  .right {
    width: 100%;
    padding: 25px;
    gap: 20px;
    border-radius: 0;
  }

  .overlay h2 {
    font-size: 16px;
    bottom: 10px;
    left: 10px;
  }

  .top h1 {
    font-size: 22px;
  }

  .top p {
    font-size: 14px;
  }

  .middle .row {
    flex-direction: column;
    gap: 10px;
  }

  form input {
    padding: 14px;
    font-size: 14px;
  }

  button {
    padding: 14px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <div class="overlay">
      <h2>Tracking rain,<br>Saving water,<br>Protecting the future.</h2>
    </div>
  </div>

  <div class="right">
    <div class="top">
      <h1>Create an account</h1>
      <p>Create your account and start your journey.</p>
    </div>

    <div class="middle">
      <form onsubmit="handleSubmit(event)">
        <div class="row">
          <input id="firstName" type="text" placeholder="First name" required>
          <input id="lastName" type="text" placeholder="Last name" required>
        </div>

        <input id="email" type="email" placeholder="Email" required>

        <div class="password-field">
          <input id="password" type="password" placeholder="Enter your password" required>
          <span onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Create account</button>
      </form>
    </div>

    <div class="bottom">
      <p>Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAswvBN_h2Cx94a0QaYetgmdrGeKYGl6rU",
  authDomain: "lucky-nature-490301-d9.firebaseapp.com",
  projectId: "lucky-nature-490301-d9",
    appId: "1:193854568298:web:883858da058d6290b69713",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.handleSubmit = async function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await updateProfile(userCredential.user, {
      displayName: firstName + " " + lastName
    });

    alert("Account created successfully ✅");
    window.location.href = "website.html";

  }catch(error){
  console.log(error);
  alert(error.message);
}
</script>

<script>
function togglePassword() {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
